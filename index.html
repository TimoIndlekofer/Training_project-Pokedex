<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- CSS files -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/card-small.css">
    <link rel="stylesheet" href="./styles/card-large.css">
</head>

<body onload="init()">
    <header>
        <div class="header-container-logo-title">
            <img src="./assets/img/placeholder_pokedex_logo.png" alt="Pokedox logo" class="header-logo">
            <h1>Pokedex</h1>
        </div>
            <input type="text" placeholder="Search Pokemon ..." data-id="search-input" class="header-search-bar">
    </header>



    <main class="content-main" data-id="content">
        <section class="pokemon-cards-main" id="pokemon-cards-container"></section>
        <div class="button-load-more-container">
            <button class="button-load-more" data-id="load-more-button" onclick="fetchMorePokemons()">Load more Pokemon</button>
        </div>
    </main>



    <footer>
        <p>Erstellt: Timo (Juni 2026)</p>
        <a href="#">Impressum</a>
        <a href="https://github.com/TimoIndlekofer" target="_blank">GitHub</a>
        <a href="https://pokeapi.co/" target="_blank">PokéAPI</a>
    </footer>


    <!-- JavaScript files -->
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</body>

</html>
