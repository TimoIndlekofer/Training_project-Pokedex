<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- CSS files -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/card-small.css">
    <link rel="stylesheet" href="./styles/card-large.css">
    <link rel="stylesheet" href="./styles/card-bg-color.css">
</head>

<body onload="init()">
    <!-- Header -->
    <header>
        <div class="header-container-logo-title">
            <img src="./assets/img/placeholder_pokedex_logo.png" alt="Pokedox logo" class="header-logo">
            <h1>Pokedex</h1>
        </div>

        <!-- Search bar -->
        <div class="header-search-bar-container" id="search-bar-container">
            <span class="header-search-bar-icon">🔍</span>
            <input type="text" placeholder="Search Pokemon ..." data-id="search-input" class="header-search-bar" id="search-bar-input" oninput="if(this.value.trim() === '') renderPokemons(allPokemons), startSearch()">
            <button type="button" class="header-search-bar-clear-button" id="search-bar-clear-button">X</button>
            <button class="header-search-bar-button" id="search-bar-button" onclick="startSearch()">Search</button>
        </div>
        <div class="header-search-bar-letters-message" id="search-bar-letter-message">
            <span>Please insert 3 letters or more</span>
        </div>
    </header>

    <!-- Main (Pokemon cards) -->
    <main class="content-main" data-id="content">
        <section class="pokemon-cards-main" id="pokemon-cards-container"></section>

        <!-- Loading spinner -->
        <div class="containt-main-loading-spinner-container" id="loading-spinner">
            <div class="pokeball-spinner"></div>
            <p>Catching Pokemon ...</p>
        </div>

        <!-- Load more Pokemons button -->
        <div class="button-load-more-container">
            <button class="button-load-more" id="load-more-pokemons" data-id="load-more-button" onclick="fetchMorePokemons()">Load more Pokemon</button>
        </div>

        <!-- Search bar error message -->
        <div class="no-results-container" id="no-results-error-message">
            <h2>No Pokemon found!</h2>
            <p>Please check your spelling or try a different Pokemon name.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Erstellt: Timo (Juni 2026)</p>
        <a href="#">Impressum</a>
        <a href="https://github.com/TimoIndlekofer" target="_blank">GitHub</a>
        <a href="https://pokeapi.co/" target="_blank">PokéAPI</a>
    </footer>

    <!-- JavaScript files -->
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</body>

</html>
